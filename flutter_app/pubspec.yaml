name: shopsmart
description: AI-powered kirana store management app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  provider: ^6.1.0
  go_router: ^14.0.0
  mobile_scanner: ^5.0.0
  fl_chart: ^0.68.0
  sqflite: ^2.3.0
  shared_preferences: ^2.2.0
  qr_flutter: ^4.1.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  json_annotation: ^4.9.0
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  generate: true
  uses-material-design: true
