<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopSmart — Login</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>🛒 ShopSmart</h1>
      <p>Retail Intelligence Platform · Cloud Nine</p>
    </div>

    <div id="login-error" style="display:none;background:#FFCDD2;color:#C62828;padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:14px;"></div>

    <div class="form-group" style="margin-bottom:14px">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="owner@myshop.com" autocomplete="username"/>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:11px" onclick="doLogin()" id="login-btn">
      Sign In
    </button>

    <p style="text-align:center;margin-top:16px;font-size:13px;color:#666">
      Don't have an account? <a href="signup.html" style="color:var(--primary);text-decoration:none;font-weight:600">Sign up</a>
    </p>
    <hr style="margin:20px 0;border-color:#eee"/>
    <p style="text-align:center;font-size:11px;color:#aaa">ShopSmart v1.0 · Cloud Nine Team</p>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js?v=5"></script>
<script>
  var isLoggingIn = false;
  
  auth.onAuthStateChanged(async function(user) {
    if (isLoggingIn) return;
    if (user) {
      try {
        var doc = await db.collection("users").doc(user.uid).get();
        var role = doc.exists ? (doc.data().role || "User") : "User";
        window.location.href = role === "User" ? "pages/landing.html" : "pages/dashboard.html";
      } catch(e) { /* Don't redirect on error */ }
    }
  });

  async function doLogin() {
    var email = document.getElementById("email").value.trim();
    var pass  = document.getElementById("password").value;
    var role  = document.getElementById("login-role").value;
    var errEl = document.getElementById("login-error");
    var btn   = document.getElementById("login-btn");
    errEl.style.display = "none";
    if (!email || !pass) { errEl.textContent = "Please enter email and password."; errEl.style.display = "block"; return; }
    btn.textContent = "Signing in…"; btn.disabled = true;
    isLoggingIn = true;
    
    try {
      var cred = await auth.signInWithEmailAndPassword(email, pass);
      
      // Determine role from Firestore (not from UI)
      var isAdminEmail = email.toLowerCase() === "admin@gmail.com";
      var finalRole = "User"; // Default
      
      try {
        var existingDoc = await db.collection("users").doc(cred.user.uid).get();
        if (existingDoc.exists && existingDoc.data().role) {
          finalRole = existingDoc.data().role;
        }
      } catch(re) { /* Firestore read failed — use default */ }
      
      // Admin email always gets Admin
      if (isAdminEmail) finalRole = "Admin";
      
      // Save/update user doc
      try {
        await db.collection("users").doc(cred.user.uid).set({
          uid: cred.user.uid,
          name: cred.user.displayName || email.split("@")[0],
          email: email,
          role: finalRole,
          lastLogin: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      } catch(we) { /* Firestore write failed — still redirect */ }
      
      // Cache role and redirect
      localStorage.setItem("ss_role_" + cred.user.uid, JSON.stringify({
        role: finalRole, name: cred.user.displayName || email.split("@")[0], email: email, ts: Date.now()
      }));
      
      window.location.href = finalRole === "User" ? "pages/landing.html" : "pages/dashboard.html";
    } catch (e) {
      var msg = "Something went wrong. Please try again.";
      var code = e.code || "";
      if (code === "auth/user-not-found" || code === "auth/wrong-password" || code === "auth/invalid-credential") msg = "Incorrect email or password.";
      else if (code === "auth/invalid-email") msg = "Please enter a valid email address.";
      else if (code === "auth/user-disabled") msg = "This account has been disabled. Contact the admin.";
      else if (code === "auth/network-request-failed") msg = "No internet connection. Check your network.";
      else if (code === "auth/too-many-requests") msg = "Too many failed attempts. Please wait and try again.";
      errEl.textContent = msg;
      errEl.style.display = "block";
      btn.textContent = "Sign In"; 
      btn.disabled = false;
    }
  }

  document.addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });
</script>
<script src="js/offline.js?v=1"></script>
</body>
</html>
