<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopSmart — Login</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>🛒 ShopSmart</h1>
      <p>Retail Intelligence Platform · Cloud Nine</p>
    </div>

    <div id="login-error" style="display:none;background:#FFCDD2;color:#C62828;padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:14px;"></div>

    <div class="form-group" style="margin-bottom:14px">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="owner@myshop.com" autocomplete="username"/>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <div class="form-group" style="margin-bottom:20px">
      <label>Login as</label>
      <div id="role-selector" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button type="button" class="role-chip active" onclick="selectRole(this,'Admin')">👑 Admin</button>
        <button type="button" class="role-chip" onclick="selectRole(this,'Worker')">📦 Worker</button>
        <button type="button" class="role-chip" onclick="selectRole(this,'Cashier')">💳 Cashier</button>
        <button type="button" class="role-chip" onclick="selectRole(this,'User')">🛒 Customer</button>
      </div>
      <input type="hidden" id="login-role" value="Admin"/>
    </div>

    <style>
      .role-chip {
        padding:10px 8px; border-radius:12px; font-size:13px; font-weight:600;
        border:2px solid rgba(122,111,102,0.2); background:var(--bg,#e8e3dc); color:var(--text,#3d3530);
        cursor:pointer; transition:all 0.15s; text-align:center;
      }
      .role-chip:hover { border-color:var(--cyan-main,#00a3b8); }
      .role-chip.active {
        border-color:var(--mint-main,#3ab87d); background:linear-gradient(135deg,#3ab87d22,#00a3b822);
        color:var(--mint-dark,#2a9d66); box-shadow:inset 2px 2px 5px rgba(122,111,102,0.15);
      }
    </style>
    <script>
      function selectRole(el, role) {
        document.querySelectorAll('.role-chip').forEach(function(c) { c.classList.remove('active'); });
        el.classList.add('active');
        document.getElementById('login-role').value = role;
      }
    </script>

    <button class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:11px" onclick="doLogin()" id="login-btn">
      Sign In
    </button>

    <p style="text-align:center;margin-top:16px;font-size:13px;color:#666">
      Don't have an account? <a href="signup.html" style="color:var(--primary);text-decoration:none;font-weight:600">Sign up</a>
    </p>
    <hr style="margin:20px 0;border-color:#eee"/>
    <p style="text-align:center;font-size:11px;color:#aaa">ShopSmart v1.0 · Cloud Nine Team</p>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js?v=5"></script>
<script>
  auth.onAuthStateChanged(async function(user) {
    if (user) {
      try {
        var doc = await db.collection("users").doc(user.uid).get();
        var role = doc.exists ? (doc.data().role || "User") : "User";
        window.location.href = role === "User" ? "pages/landing.html" : "pages/dashboard.html";
      } catch(e) { window.location.href = "pages/dashboard.html"; }
    }
  });

  async function doLogin() {
    var email = document.getElementById("email").value.trim();
    var pass  = document.getElementById("password").value;
    var role  = document.getElementById("login-role").value;
    var errEl = document.getElementById("login-error");
    var btn   = document.getElementById("login-btn");
    errEl.style.display = "none";
    if (!email || !pass) { errEl.textContent = "Please enter email and password."; errEl.style.display = "block"; return; }
    btn.textContent = "Signing in…"; btn.disabled = true;
    
    try {
      var cred = await auth.signInWithEmailAndPassword(email, pass);
      // Update role and last login in Firestore
      await db.collection("users").doc(cred.user.uid).set({
        uid: cred.user.uid,
        name: cred.user.displayName || email.split("@")[0],
        email: email,
        role: role,
        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
      // Clear cached role so new role takes effect
      localStorage.removeItem("ss_role_" + cred.user.uid);
      // Redirect based on selected role
      window.location.href = role === "User" ? "pages/landing.html" : "pages/dashboard.html";
    } catch (e) {
      errEl.textContent = e.message || "Invalid email or password.";
      errEl.style.display = "block";
      btn.textContent = "Sign In"; 
      btn.disabled = false;
    }
  }

  document.addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });
</script>
<script src="js/offline.js?v=1"></script>
</body>
</html>
