<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopSmart — Sign Up</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>🛒 ShopSmart</h1>
      <p>Retail Intelligence Platform · Cloud Nine</p>
    </div>

    <div id="signup-error" style="display:none;background:#FFCDD2;color:#C62828;padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:14px;"></div>

    <div class="form-group" style="margin-bottom:14px">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="John Doe" autocomplete="name"/>
    </div>
    
    <div class="form-group" style="margin-bottom:14px">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="owner@myshop.com" autocomplete="username"/>
    </div>
    
    <div class="form-group" style="margin-bottom:20px">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password"/>
    </div>

    <div class="form-group" style="margin-bottom:20px">
      <label>I am a</label>
      <select id="role" style="width:100%">
        <option value="User">🛒 Customer (Shopper)</option>
        <option value="Cashier">💳 Cashier</option>
        <option value="Worker">📦 Stock Manager / Worker</option>
      </select>
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:11px" onclick="doSignup()" id="signup-btn">
      Create Account
    </button>

    <p style="text-align:center;margin-top:16px;font-size:13px;color:#666">
      Already have an account? <a href="index.html" style="color:var(--primary);text-decoration:none;font-weight:600">Sign in</a>
    </p>
    <hr style="margin:20px 0;border-color:#eee"/>
    <p style="text-align:center;font-size:11px;color:#aaa">ShopSmart v1.0 · Cloud Nine Team</p>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js?v=5"></script>
<script>
  var isSigningUp = false;
  
  auth.onAuthStateChanged(async function(user) {
    if (isSigningUp) return; // Don't redirect during signup
    if (user) {
      try {
        var doc = await db.collection("users").doc(user.uid).get();
        var role = doc.exists ? (doc.data().role || "User") : "User";
        window.location.href = role === "User" ? "pages/landing.html" : "pages/dashboard.html";
      } catch(e) { /* Don't redirect on error — let user stay on signup page */ }
    }
  });

  async function doSignup() {
    const name  = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const pass  = document.getElementById("password").value;
    const role  = document.getElementById("role").value;
    const errEl = document.getElementById("signup-error");
    const btn   = document.getElementById("signup-btn");
    
    errEl.style.display = "none";
    if (!name || !email || !pass) { 
      errEl.textContent = "Please fill in all fields."; 
      errEl.style.display = "block"; 
      return; 
    }
    if (pass.length < 6) {
      errEl.textContent = "Password must be at least 6 characters.";
      errEl.style.display = "block";
      return;
    }
    
    btn.textContent = "Creating account…"; 
    btn.disabled = true;
    isSigningUp = true;
    
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({ displayName: name });
      
      // Try to save user doc (don't fail signup if Firestore errors)
      try {
        await db.collection("users").doc(cred.user.uid).set({
          uid: cred.user.uid,
          name: name,
          email: email,
          role: role,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          lastLogin: firebase.firestore.FieldValue.serverTimestamp()
        });
      } catch(we) { /* Firestore write failed — still redirect */ }

      localStorage.setItem("ss_role_" + cred.user.uid, JSON.stringify({
        role: role, name: name, email: email, ts: Date.now()
      }));
      var dest = role === "User" ? "pages/landing.html" : "pages/dashboard.html";
      window.location.href = dest;
    } catch (e) {
      var msg = "Something went wrong. Please try again.";
      var code = e.code || "";
      if (code === "auth/email-already-in-use") msg = "This email is already registered. Try signing in instead.";
      else if (code === "auth/invalid-email") msg = "Please enter a valid email address.";
      else if (code === "auth/weak-password") msg = "Password is too weak. Use at least 6 characters.";
      else if (code === "auth/network-request-failed") msg = "No internet connection. Check your network.";
      else if (code === "auth/too-many-requests") msg = "Too many attempts. Please wait and try again.";
      errEl.textContent = msg;
      errEl.style.display = "block";
      btn.textContent = "Create Account"; 
      btn.disabled = false;
    }
  }

  document.addEventListener("keydown", e => { if (e.key === "Enter") doSignup(); });
</script>
<script src="js/offline.js?v=1"></script>
</body>
</html>
