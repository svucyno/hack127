<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Cart — ShopSmart</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase.js?v=7"></script>
  <script src="../js/utils.js?v=7"></script>
  <script src="../js/auth_roles.js?v=1"></script>
  <script src="../js/i18n.js?v=1"></script>
  <script src="../js/layout.js?v=7"></script>
  <script src="../js/cart_logic.js?v=1"></script>
  <script src="../js/offline.js?v=1"></script>
</head>
<body>
<div id="app"></div>
<script>
function renderCartPage() {
  var summary = CartManager.getCartSummary();
  var el = document.getElementById("cart-items-list");
  var totEl = document.getElementById("cart-totals-section");
  var btnEl = document.getElementById("checkout-btn");

  if (!summary.items.length) {
    el.innerHTML = '<div class="empty-state" style="padding:40px"><div class="empty-icon">🛒</div><p>Your cart is empty. <a href="landing.html" style="color:var(--mint);font-weight:600">Start shopping</a></p></div>';
    totEl.innerHTML = '';
    btnEl.disabled = true;
    return;
  }
  btnEl.disabled = false;

  el.innerHTML = summary.items.map(function(item) {
    var offerLine = item.offerApplied ? '<div style="font-size:10px;color:var(--accent);font-weight:600">🎯 ' + item.offerApplied.label + '</div>' : '';
    var priceHtml = item.offerApplied ? fmtCurrency(item.price) + ' <span style="text-decoration:line-through;color:#aaa;font-size:11px">' + fmtCurrency(item.originalPrice) + '</span>' : fmtCurrency(item.price);
    return '<div class="cart-item">' +
      '<div style="flex:1">' +
        '<div class="cart-item-name">' + item.name + '</div>' +
        '<div class="cart-item-price">' + priceHtml + ' × ' + item.qty + ' = ' + fmtCurrency(item.price * item.qty) + '</div>' +
        offerLine +
      '</div>' +
      '<div class="qty-ctrl">' +
        '<button class="qty-btn" onclick="changeCartQty(\'' + item.productId + '\',-1)">−</button>' +
        '<span style="font-weight:700;min-width:20px;text-align:center">' + item.qty + '</span>' +
        '<button class="qty-btn" onclick="changeCartQty(\'' + item.productId + '\',1)">+</button>' +
        '<button class="btn-icon" onclick="removeCartItem(\'' + item.productId + '\')">🗑️</button>' +
      '</div>' +
    '</div>';
  }).join("");

  var discRow = summary.totalDiscount > 0
    ? '<div class="bill-total-row" style="color:var(--accent)"><span>🎯 Discount</span><span>−' + fmtCurrency(summary.totalDiscount) + '</span></div>' : '';
  totEl.innerHTML =
    '<div class="bill-total-row"><span>Subtotal</span><span>' + fmtCurrency(summary.subtotal) + '</span></div>' +
    discRow +
    '<div class="bill-total-row"><span>CGST</span><span>' + fmtCurrency(summary.cgst) + '</span></div>' +
    '<div class="bill-total-row"><span>SGST</span><span>' + fmtCurrency(summary.sgst) + '</span></div>' +
    '<div class="bill-total-row grand"><span>Grand Total</span><span>' + fmtCurrency(summary.grandTotal) + '</span></div>';
}

function changeCartQty(pid, delta) {
  var cart = CartManager.getCart();
  var item = cart.find(function(c) { return c.productId === pid; });
  if (item) CartManager.updateQty(pid, item.qty + delta);
  renderCartPage();
}

function removeCartItem(pid) {
  CartManager.removeItem(pid);
  renderCartPage();
}

async function doCheckout() {
  var btn = document.getElementById("checkout-btn");
  btn.disabled = true; btn.textContent = "Processing…";
  try {
    var user = auth.currentUser;
    if (!user) { showToast("Please log in first.", "error"); return; }
    var orderId = await CartManager.checkout(user.uid, user.displayName || user.email);
    renderCartPage();
    // Show pickup notification popup
    showPickupPopup(orderId);
  } catch(e) {
    showToast("Checkout failed. Please try again.", "error");
  } finally {
    btn.disabled = false; btn.textContent = "✅ Place Order";
  }
}

function showPickupPopup(orderId) {
  var overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:9999";
  var popup = document.createElement("div");
  popup.style.cssText = "background:var(--card-bg,#e8e3dc);border-radius:20px;padding:32px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);border:1px solid var(--border,#ccc)";
  popup.innerHTML =
    '<div style="font-size:48px;margin-bottom:16px">🎉</div>' +
    '<div style="font-size:20px;font-weight:800;color:var(--text,#333);margin-bottom:8px">Order Placed!</div>' +
    '<div style="font-size:14px;color:var(--text-2,#666);margin-bottom:16px">Order ID: <strong>' + orderId + '</strong></div>' +
    '<div style="background:linear-gradient(135deg,#3ab87d22,#00a3b822);border:1px solid #3ab87d44;border-radius:14px;padding:16px;margin-bottom:20px">' +
      '<div style="font-size:28px;margin-bottom:8px">🏪</div>' +
      '<div style="font-size:15px;font-weight:700;color:var(--mint-dark,#2a9d66)">Please collect your items from the store</div>' +
      '<div style="font-size:24px;font-weight:900;color:var(--mint,#3ab87d);margin-top:8px">within 10 minutes</div>' +
    '</div>' +
    '<button style="padding:12px 32px;border-radius:12px;font-size:14px;font-weight:600;border:none;cursor:pointer;background:linear-gradient(135deg,#3ab87d,#2a9d66);color:#fff;box-shadow:4px 4px 8px rgba(0,0,0,0.2)" onclick="this.closest(\'div[style*=fixed]\').remove();window.location.href=\'orders.html\'">View My Orders</button>';
  overlay.appendChild(popup);
  document.body.appendChild(overlay);
}

document.addEventListener("DOMContentLoaded", function() {
  buildLayout("🛒 My Cart");
  document.getElementById("page-content").innerHTML =
    '<div class="card" style="margin-bottom:14px">' +
      '<div class="card-title">🛒 Cart Items</div>' +
      '<div id="cart-items-list"></div>' +
    '</div>' +
    '<div class="card" style="margin-bottom:14px">' +
      '<div class="card-title">💰 Order Summary</div>' +
      '<div id="cart-totals-section"></div>' +
    '</div>' +
    '<div style="display:flex;gap:12px;flex-wrap:wrap">' +
      '<button class="btn btn-primary" id="checkout-btn" onclick="doCheckout()" disabled style="flex:1;justify-content:center;padding:14px;font-size:15px">✅ Place Order</button>' +
    '</div>';
  renderCartPage();
});
</script>
</body>
</html>
