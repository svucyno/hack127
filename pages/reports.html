<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reports — ShopSmart</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase.js?v=5"></script>
  <script src="../js/utils.js?v=5"></script>
  <script src="../js/layout.js?v=5"></script>
</head>
<body>
<div id="app"></div>
<script>
var reportData = null;

async function loadReport(period) {
  document.getElementById("report-body").innerHTML = '<div style="text-align:center;padding:32px;color:#888">Loading ' + period + ' report…</div>';
  try {
  var days = period === "daily" ? 1 : period === "weekly" ? 7 : 30;
  var since = new Date(); since.setDate(since.getDate() - days + 1);

  var snap = await db.collection(COL.sales).where("dateObj",">=",since).get();
  var sales = snap.docs.map(function(d) { return d.data(); });

  var totalRevenue=0, totalProfit=0, totalGST=0, billCount=sales.length, itemCount=0;
  var dayMap={}, prodMap={}, catMap={}, gstSlabMap={};

  sales.forEach(function(s) {
    totalRevenue += s.grandTotal||0;
    totalProfit  += s.profit||0;
    totalGST     += (s.totalCGST||0)+(s.totalSGST||0);
    if (!dayMap[s.date]) dayMap[s.date]={revenue:0,profit:0,bills:0};
    dayMap[s.date].revenue += s.grandTotal||0;
    dayMap[s.date].profit  += s.profit||0;
    dayMap[s.date].bills++;
    (s.items||[]).forEach(function(i) {
      itemCount += i.qty;
      if (!prodMap[i.name]) prodMap[i.name]=0;
      prodMap[i.name] += i.qty;
      if (!catMap[i.category]) catMap[i.category]=0;
      catMap[i.category] += i.qty*i.price;
      var g = calcGST(i.price,i.qty,i.gst||0);
      if (!gstSlabMap[i.gst||0]) gstSlabMap[i.gst||0]=0;
      gstSlabMap[i.gst||0] += g.gstAmt;
    });
  });

  reportData = { period: period, totalRevenue: totalRevenue, totalProfit: totalProfit, totalGST: totalGST, billCount: billCount, itemCount: itemCount, dayMap: dayMap, prodMap: prodMap, catMap: catMap, gstSlabMap: gstSlabMap, since: since };

  var topProds = Object.entries(prodMap).sort(function(a,b) { return b[1]-a[1]; }).slice(0,10);
  var labels=[]; var profArr=[]; var revArr=[];
  for(var i=days-1;i>=0;i--){
    var d=new Date(); d.setDate(d.getDate()-i);
    var ds=d.toISOString().split("T")[0];
    labels.push(d.toLocaleDateString("en-IN",{day:"2-digit",month:"short"}));
    profArr.push(+(dayMap[ds]?dayMap[ds].profit:0).toFixed(2));
    revArr.push(+(dayMap[ds]?dayMap[ds].revenue:0).toFixed(2));
  }

  var topProdsHtml = topProds.map(function(entry) { return '<tr><td>' + entry[0] + '</td><td><strong>' + entry[1] + '</strong></td></tr>'; }).join("");
  if (!topProdsHtml) topProdsHtml = '<tr><td colspan="2" style="text-align:center;color:#888">No data</td></tr>';

  var gstTableHtml = Object.entries(gstSlabMap).map(function(entry) { return '<tr><td>' + entry[0] + '%</td><td>' + fmtCurrency(entry[1]) + '</td></tr>'; }).join("");
  if (!gstTableHtml) gstTableHtml = '<tr><td colspan="2" style="text-align:center;color:#888">No data</td></tr>';

  var dailyHtml = Object.entries(dayMap).sort(function(a,b) { return b[0].localeCompare(a[0]); }).map(function(entry) {
    return '<tr><td>' + fmtDate(entry[0]) + '</td><td>' + entry[1].bills + '</td><td>' + fmtCurrency(entry[1].revenue) + '</td><td style="color:var(--green);font-weight:600">' + fmtCurrency(entry[1].profit) + '</td></tr>';
  }).join("");
  if (!dailyHtml) dailyHtml = '<tr><td colspan="4" style="text-align:center;color:#888">No sales in this period.</td></tr>';

  document.getElementById("report-body").innerHTML =
    '<!-- Summary cards -->' +
    '<div class="kpi-grid" style="margin-bottom:18px">' +
      '<div class="kpi-card"><div class="kpi-label">Total Bills</div><div class="kpi-value">' + billCount + '</div></div>' +
      '<div class="kpi-card accent"><div class="kpi-label">Items Sold</div><div class="kpi-value">' + fmtNum(itemCount) + '</div></div>' +
      '<div class="kpi-card blue"><div class="kpi-label">Revenue</div><div class="kpi-value" style="font-size:20px">' + fmtCurrency(totalRevenue) + '</div></div>' +
      '<div class="kpi-card"><div class="kpi-label">Profit</div><div class="kpi-value" style="font-size:20px;color:var(--green)">' + fmtCurrency(totalProfit) + '</div></div>' +
      '<div class="kpi-card yellow"><div class="kpi-label">GST Collected</div><div class="kpi-value" style="font-size:20px">' + fmtCurrency(totalGST) + '</div></div>' +
    '</div>' +

    '<!-- Charts -->' +
    '<div class="grid-2" style="margin-bottom:18px">' +
      '<div class="card">' +
        '<div class="card-title">Revenue vs Profit Trend</div>' +
        '<div class="chart-wrap"><canvas id="trendChart"></canvas></div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="card-title">GST Slab Breakdown</div>' +
        '<div class="chart-wrap"><canvas id="gstChart"></canvas></div>' +
      '</div>' +
    '</div>' +

    '<!-- Tables row -->' +
    '<div class="grid-2" style="margin-bottom:18px">' +
      '<div class="card">' +
        '<div class="card-title">🏆 Top Selling Products</div>' +
        '<div class="table-wrap">' +
          '<table><thead><tr><th>Product</th><th>Units Sold</th></tr></thead>' +
          '<tbody>' + topProdsHtml + '</tbody>' +
          '</table>' +
        '</div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="card-title">🧾 GST Summary by Slab</div>' +
        '<div class="table-wrap">' +
          '<table><thead><tr><th>GST Slab</th><th>GST Collected</th></tr></thead>' +
          '<tbody>' + gstTableHtml + '</tbody>' +
          '</table>' +
        '</div>' +
      '</div>' +
    '</div>' +

    '<!-- Daily breakdown -->' +
    '<div class="card">' +
      '<div class="card-title">Daily Breakdown</div>' +
      '<div class="table-wrap">' +
        '<table><thead><tr><th>Date</th><th>Bills</th><th>Revenue</th><th>Profit</th></tr></thead>' +
        '<tbody>' + dailyHtml + '</tbody>' +
        '</table>' +
      '</div>' +
    '</div>';

  // Charts
  new Chart(document.getElementById("trendChart"),{
    type:"line",
    data:{labels:labels,datasets:[
      {label:"Revenue",data:revArr,borderColor:"#1565C0",backgroundColor:"rgba(21,101,192,.1)",fill:true,tension:.3},
      {label:"Profit",data:profArr,borderColor:"#2E7D32",backgroundColor:"rgba(46,125,50,.1)",fill:true,tension:.3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"top"}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return "₹"+v;}}},x:{ticks:{maxRotation:45,font:{size:9}}}}}
  });

  var gstLabels = Object.keys(gstSlabMap).map(function(k){return k+"%";});
  var gstVals   = Object.values(gstSlabMap);
  if (gstLabels.length) {
    new Chart(document.getElementById("gstChart"),{
      type:"pie",
      data:{labels:gstLabels,datasets:[{data:gstVals,backgroundColor:["#2E7D32","#66BB6A","#E65100","#1565C0","#F9A825"]}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom"}}}
    });
  }
  } catch(e) {
    console.error("Report load error:", e);
    document.getElementById("report-body").innerHTML = '<div class="card" style="text-align:center;padding:32px;color:var(--red)">Error: ' + e.message + '<br><button class="btn btn-sm btn-outline" style="margin-top:8px" onclick="loadReport(\'' + period + '\')">🔄 Retry</button></div>';
  }
}

function exportCSV() {
  if (!reportData) return;
  var rows = [["Date","Bills","Revenue","Profit"]];
  Object.entries(reportData.dayMap).sort(function(a,b){return a[0].localeCompare(b[0]);}).forEach(function(entry){
    rows.push([entry[0],entry[1].bills,entry[1].revenue.toFixed(2),entry[1].profit.toFixed(2)]);
  });
  var csv = rows.map(function(r){return r.join(",");}).join("\n");
  var a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
  a.download = "ShopSmart_Report_" + reportData.period + "_" + today() + ".csv";
  a.click();
  showToast("CSV downloaded!");
}

function printReport() {
  window.print();
}

document.addEventListener("DOMContentLoaded", function() {
  buildLayout("Reports & Export");

  document.getElementById("topbar-actions").innerHTML =
    '<button class="btn btn-outline btn-sm" onclick="exportCSV()">⬇ CSV</button>' +
    '<button class="btn btn-sm btn-primary" onclick="printReport()">🖨 Print</button>';

  document.getElementById("page-content").innerHTML =
    '<div style="display:flex;gap:10px;margin-bottom:18px">' +
      '<button class="btn btn-outline" id="btn-daily" onclick="setReport(\'daily\')">Today</button>' +
      '<button class="btn btn-outline" id="btn-weekly" onclick="setReport(\'weekly\')">Last 7 Days</button>' +
      '<button class="btn btn-primary" id="btn-monthly" onclick="setReport(\'monthly\')">Last 30 Days</button>' +
    '</div>' +
    '<div id="report-body"></div>';

  window.setReport = function(p) {
    ["daily","weekly","monthly"].forEach(function(x) {
      document.getElementById("btn-"+x).className = "btn " + (x===p?"btn-primary":"btn-outline");
    });
    loadReport(p);
  };
  loadReport("monthly");
});
</script>
</body>
</html>
