<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Orders — ShopSmart</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase.js?v=7"></script>
  <script src="../js/utils.js?v=7"></script>
  <script src="../js/auth_roles.js?v=1"></script>
  <script src="../js/i18n.js?v=1"></script>
  <script src="../js/layout.js?v=7"></script>
  <script src="../js/cart_logic.js?v=1"></script>
  <script src="../js/offline.js?v=1"></script>
</head>
<body>
<div id="app"></div>
<script>
var myOrders = [];

async function loadOrders() {
  try {
    var user = auth.currentUser;
    if (!user) { setTimeout(loadOrders, 500); return; }
    var snap = await db.collection(COL.sales).where("userId","==",user.uid).get();
    myOrders = snap.docs.map(function(d) { return Object.assign({id:d.id}, d.data()); })
      .sort(function(a,b) {
        var ta = a.createdAt && a.createdAt.toDate ? a.createdAt.toDate().getTime() : 0;
        var tb = b.createdAt && b.createdAt.toDate ? b.createdAt.toDate().getTime() : 0;
        return tb - ta;
      });
    myOrders.forEach(function(o) { if (o.status === "Not Started") o.status = "New"; });
    renderOrders();
  } catch(e) {
    var el = document.getElementById("orders-list");
    if (el) el.innerHTML = '<div style="color:var(--red);text-align:center;padding:24px">Could not load orders.</div>';
  }
}

function renderOrders() {
  var el = document.getElementById("orders-list");
  if (!myOrders.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><p>No orders yet. <a href="landing.html" style="color:var(--mint);font-weight:600">Start shopping</a></p></div>';
    return;
  }
  el.innerHTML = myOrders.map(function(o) {
    var dateStr = o.createdAt && o.createdAt.toDate ? o.createdAt.toDate().toLocaleString("en-IN",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : "—";
    var itemsList = (o.items||[]).map(function(i) { return i.name + ' x' + i.qty; }).join(", ");
    var st = o.status;
    var sc = {"New":"badge-red","Packing":"badge-yellow","Ready":"badge-green","Completed":"badge-blue"};
    var si = {"New":"🆕 Order Placed","Packing":"📦 Being Packed","Ready":"✅ Ready for Pickup","Completed":"🎉 Completed"};

    // Status message for customer
    var statusMsg = '';
    if (st === "New") statusMsg = '<div style="font-size:12px;color:var(--accent);margin-top:6px">Your order has been placed. Waiting for store to accept.</div>';
    else if (st === "Packing") statusMsg = '<div style="font-size:12px;color:#f0ad4e;margin-top:6px">Your items are being packed. Almost ready!</div>';
    else if (st === "Ready") statusMsg = '<div style="font-size:12px;color:var(--mint);font-weight:600;margin-top:6px">🏪 Your order is ready! Come pick it up.</div>';

    // Action button
    var actionBtn = '';
    if (st === "Ready") {
      actionBtn = '<button class="btn btn-sm btn-accent" onclick="confirmReceived(\'' + o.id + '\')">🤝 Order Received</button>';
    } else if (st === "Completed") {
      actionBtn = '<button class="btn btn-sm btn-outline" onclick="buyAgain(\'' + o.id + '\')">🔄 Buy Again</button>';
    }

    // Progress bar
    var steps = ["New","Packing","Ready","Completed"];
    var ci = steps.indexOf(st); if (ci < 0) ci = 0;
    var prog = '<div style="display:flex;gap:4px;margin:10px 0 4px">' + steps.map(function(s,i) {
      return '<div style="flex:1;height:4px;border-radius:2px;background:' + (i<=ci?"var(--mint)":"var(--border)") + '"></div>';
    }).join("") + '</div>' +
    '<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-3)">' +
      '<span>Placed</span><span>Packing</span><span>Ready</span><span>Done</span></div>';

    return '<div style="background:var(--card-bg);border-radius:14px;box-shadow:var(--shadow);border:1px solid var(--border);padding:16px;margin-bottom:12px">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">' +
        '<div><div style="font-weight:700;font-size:14px;color:var(--text)">' + (o.orderId||o.id) + '</div>' +
        '<div style="font-size:12px;color:var(--text-3)">' + dateStr + '</div></div>' +
        '<span class="badge ' + (sc[st]||"badge-grey") + '">' + (si[st]||st) + '</span>' +
      '</div>' + prog + statusMsg +
      '<div style="font-size:12px;color:var(--text-2);margin-top:8px">' + itemsList + '</div>' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;flex-wrap:wrap;gap:8px">' +
        '<div style="font-weight:700;font-size:15px;color:var(--mint)">' + fmtCurrency(o.grandTotal) + '</div>' +
        '<div>' + actionBtn + '</div>' +
      '</div></div>';
  }).join("");
}

async function confirmReceived(id) {
  // Show custom confirmation popup
  var overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:9999";
  var popup = document.createElement("div");
  popup.style.cssText = "background:var(--card-bg,#e8e3dc);border-radius:20px;padding:32px;max-width:380px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);border:1px solid var(--border,#ccc)";
  popup.innerHTML =
    '<div style="font-size:48px;margin-bottom:12px">🤝</div>' +
    '<div style="font-size:18px;font-weight:700;color:var(--text,#333);margin-bottom:8px">Confirm Pickup</div>' +
    '<div style="font-size:13px;color:var(--text-2,#666);margin-bottom:20px">Have you received all items in this order?</div>' +
    '<div style="display:flex;gap:12px;justify-content:center">' +
      '<button id="confirm-no" style="padding:10px 28px;border-radius:12px;font-size:14px;font-weight:600;border:1px solid var(--border,#ccc);cursor:pointer;background:var(--card-bg,#e8e3dc);color:var(--text,#333)">Cancel</button>' +
      '<button id="confirm-yes" style="padding:10px 28px;border-radius:12px;font-size:14px;font-weight:600;border:none;cursor:pointer;background:linear-gradient(135deg,#3ab87d,#2a9d66);color:#fff">Yes, Received</button>' +
    '</div>';
  overlay.appendChild(popup);
  document.body.appendChild(overlay);

  return new Promise(function(resolve) {
    popup.querySelector("#confirm-yes").addEventListener("click", function() {
      overlay.remove();
      doConfirmReceived(id);
    });
    popup.querySelector("#confirm-no").addEventListener("click", function() {
      overlay.remove();
    });
    overlay.addEventListener("click", function(e) {
      if (e.target === overlay) overlay.remove();
    });
  });
}

async function doConfirmReceived(id) {
  try {
    var o = myOrders.find(function(x){return x.id===id;});
    // Mark as completed
    await db.collection(COL.sales).doc(id).update({
      status: "Completed",
      customerConfirmed: true,
      completedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    if (o) o.status = "Completed";

    // Add to customers collection for loyalty
    var user = auth.currentUser;
    if (user && o) {
      var custRef = db.collection(COL.customers).doc(user.uid);
      var custDoc = await custRef.get();
      if (custDoc.exists) {
        await custRef.update({
          totalSpent: firebase.firestore.FieldValue.increment(o.grandTotal||0),
          totalVisits: firebase.firestore.FieldValue.increment(1),
          lastVisit: today()
        });
      } else {
        await custRef.set({
          name: user.displayName || o.customerName || "Customer",
          email: user.email || "",
          phone: "", totalSpent: o.grandTotal||0, totalVisits: 1,
          loyaltyPoints: Math.floor((o.grandTotal||0)/10),
          lifetimePoints: Math.floor((o.grandTotal||0)/10),
          tier: "Bronze", coupons: [], lastVisit: today(),
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    }
    renderOrders();
    showToast("Order completed! Thank you for shopping 🎉");
  } catch(e) { showToast(friendlyError(e),"error"); }
}

async function buyAgain(id) {
  var o = myOrders.find(function(x){return x.id===id;});
  if (!o || !o.items) return;
  try {
    for (var i = 0; i < o.items.length; i++) {
      var doc = await db.collection(COL.products).doc(o.items[i].id).get();
      if (doc.exists) CartManager.addItem(Object.assign({id:doc.id}, doc.data()), null);
    }
    showToast("Items added to cart!");
  } catch(e) { showToast("Could not add items.", "error"); }
}

setInterval(function(){ if(document.visibilityState==="visible") loadOrders(); }, 15000);

document.addEventListener("DOMContentLoaded", function() {
  buildLayout("📦 My Orders");
  document.getElementById("page-content").innerHTML =
    '<div class="card"><div class="card-title">📦 My Orders</div>' +
    '<div id="orders-list"><div style="text-align:center;padding:24px;color:#888">Loading…</div></div></div>';
  auth.onAuthStateChanged(function(user) { if (user) loadOrders(); });
});
</script>
</body>
</html>
