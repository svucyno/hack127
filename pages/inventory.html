<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Inventory — ShopSmart</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="../js/firebase.js?v=6"></script>
  <script src="../js/utils.js?v=6"></script>
  <script src="../js/auth_roles.js?v=1"></script>
  <script src="../js/i18n.js?v=1"></script>
  <script src="../js/layout.js?v=6"></script>
  <script src="../js/barcode-scanner.js?v=1"></script>
  <script src="../js/offline.js?v=1"></script>
</head>
<body>
<div id="app"></div>
<script>
var CATEGORIES = ["Groceries","Dairy","Beverages","Personal Care","Stationery","Electronics","Snacks","Medicines","Cleaning","Other"];
var allProducts = [], allSuppliers = [], editingId = null, searchQ = "", filterCat = "", filterStatus = "";

function stockStatus(p) {
  var pct = (p.quantity / (p.maxStock || 1)) * 100;
  if (pct <= 10) return "lowstock";
  if (p.expiryDate) {
    var thresholds = getExpiryThresholds(p.category);
    if (daysUntil(p.expiryDate) <= thresholds.urgent) return "expiring";
  }
  return "ok";
}

function renderCatNav() {
  var el = document.getElementById("inv-cat-nav");
  if (el) el.innerHTML = buildCatNav(CATEGORIES, allProducts, filterCat, "selectInvCat");
}

function selectInvCat(cat) {
  filterCat = cat;
  renderCatNav();
  renderTable();
}

function renderTable() {
  var list = allProducts;
  if (searchQ) list = list.filter(function(p) { return p.name.toLowerCase().includes(searchQ) || (p.company||"").toLowerCase().includes(searchQ); });
  if (filterCat) list = list.filter(function(p) { return p.category === filterCat; });
  if (filterStatus === "lowstock") list = list.filter(function(p) { return stockStatus(p) === "lowstock"; });
  if (filterStatus === "expiring") list = list.filter(function(p) { return stockStatus(p) === "expiring"; });

  var tbody = document.getElementById("inv-tbody");
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:32px;color:#888">No products found.</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(function(p) {
    var st = stockStatus(p);
    var pct = ((p.quantity/(p.maxStock||1))*100).toFixed(0);
    var stBadge = st==="lowstock" ? '<span class="badge badge-red">Low Stock ' + pct + '%</span>'
                : st==="expiring" ? '<span class="badge badge-yellow">Expiring Soon</span>'
                : '<span class="badge badge-green">OK</span>';
    var exp = p.expiryDate ? daysUntil(p.expiryDate) : null;
    var expBadge;
    if (exp !== null) {
      var th = getExpiryThresholds(p.category);
      if (exp <= 0) expBadge = '<span class="badge badge-red">Expired</span>';
      else if (exp <= th.urgent) expBadge = '<span class="badge badge-red">' + exp + 'd left</span>';
      else if (exp <= th.warning) expBadge = '<span class="badge badge-yellow">' + exp + 'd left</span>';
      else expBadge = '<span style="font-size:12px">' + fmtDate(p.expiryDate) + '</span>';
    } else { expBadge = "—"; }
    var sup = p.supplierId ? allSuppliers.find(function(s){return s.id===p.supplierId;}) : null;
    var supName = sup ? '<span style="font-size:12px">🏪 ' + sup.name + '</span>' : '<span style="font-size:12px;color:#bbb">—</span>';
    return '<tr>'
      + '<td><strong>' + p.name + '</strong><br><span style="font-size:11px;color:#888">' + (p.company||p.brand||"") + '</span></td>'
      + '<td>' + p.category + '</td>'
      + '<td>' + (p.size||"—") + '</td>'
      + '<td>' + fmtCurrency(p.costPrice) + '</td>'
      + '<td>' + fmtCurrency(p.sellingPrice) + '</td>'
      + '<td>' + fmtNum(p.quantity) + ' / ' + fmtNum(p.maxStock) + '</td>'
      + '<td>' + stBadge + '</td>'
      + '<td>' + expBadge + '</td>'
      + '<td>' + supName + '</td>'
      + '<td>'
      +   '<button class="btn-icon" title="Edit" onclick="openEdit(\'' + p.id + '\')">✏️</button>'
      +   '<button class="btn-icon" title="Delete" onclick="deleteProduct(\'' + p.id + '\',\'' + (p.name||"").replace(/'/g,"\\'") + '\')">🗑️</button>'
      + '</td></tr>';
  }).join("");
}

async function loadInventory() {
  try {
    var results = await Promise.all([
      db.collection(COL.products).orderBy("name").get(),
      db.collection(COL.suppliers).orderBy("name").get()
    ]);
    allProducts = results[0].docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
    allSuppliers = results[1].docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
    renderCatNav();
    renderTable();
    populateSupplierDropdown();
  } catch(e) {
    console.error("Inventory load error:", e);
    var tbody = document.getElementById("inv-tbody");
    if (tbody) tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:32px;color:var(--red)">Error: ' + e.message + '</td></tr>';
  }
}

function populateSupplierDropdown() {
  var sel = document.getElementById("prod-supplier");
  if (!sel) return;
  sel.innerHTML = '<option value="">— No Supplier —</option>' +
    allSuppliers.map(function(s) {
      return '<option value="' + s.id + '">🏪 ' + s.name + (s.phone ? ' (' + s.phone + ')' : '') + '</option>';
    }).join("");
}

function openAdd() {
  editingId = null;
  document.getElementById("modal-title").textContent = "Add Product";
  document.getElementById("prod-form").reset();
  document.getElementById("prod-id").value = "";
  document.getElementById("prod-modal").classList.add("open");
}

function openEdit(id) {
  var p = allProducts.find(function(x) { return x.id === id; });
  if (!p) return;
  editingId = id;
  document.getElementById("modal-title").textContent = "Edit Product";
  document.getElementById("prod-id").value = id;
  document.getElementById("prod-company").value = p.company || p.brand || "";
  document.getElementById("prod-name").value = p.name;
  document.getElementById("prod-cat").value = p.category;
  document.getElementById("prod-size").value = p.size || "";
  document.getElementById("prod-cost").value = p.costPrice;
  document.getElementById("prod-sell").value = p.sellingPrice;
  document.getElementById("prod-qty").value = p.quantity;
  document.getElementById("prod-max").value = p.maxStock;
  document.getElementById("prod-gst").value = p.gst || 0;
  document.getElementById("prod-exp").value = p.expiryDate || "";
  document.getElementById("prod-supplier").value = p.supplierId || "";
  if (document.getElementById("prod-barcode")) document.getElementById("prod-barcode").value = p.barcode || "";
  document.getElementById("prod-modal").classList.add("open");
}

function closeModal() {
  document.getElementById("prod-modal").classList.remove("open");
}
</script>
<script>
async function saveProduct() {
  var company = document.getElementById("prod-company").value.trim();
  var name = document.getElementById("prod-name").value.trim();
  var cat = document.getElementById("prod-cat").value;
  var size = document.getElementById("prod-size").value.trim();
  var cost = parseFloat(document.getElementById("prod-cost").value);
  var sell = parseFloat(document.getElementById("prod-sell").value);
  var qty = parseInt(document.getElementById("prod-qty").value);
  var max = parseInt(document.getElementById("prod-max").value);
  var gst = parseInt(document.getElementById("prod-gst").value);
  var exp = document.getElementById("prod-exp").value;
  var supId = document.getElementById("prod-supplier").value;
  var barcode = document.getElementById("prod-barcode") ? document.getElementById("prod-barcode").value.trim() : "";

  if (!name || !cat || isNaN(cost) || isNaN(sell) || isNaN(qty) || isNaN(max)) {
    showToast("Please fill all required fields.", "error"); return;
  }
  if (sell < cost) {
    if (!confirmAction("Selling price is less than cost price. Continue?")) return;
  }

  var data = {
    company: company, name: name, brand: company, category: cat, size: size,
    costPrice: cost, sellingPrice: sell, quantity: qty, maxStock: max,
    gst: gst || 0, expiryDate: exp || null, supplierId: supId || null, barcode: barcode || null,
    salesCount30: 0, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    if (editingId) {
      await db.collection(COL.products).doc(editingId).update(data);
      showToast("Product updated successfully!");
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      data.createdDaysAgo = 0;
      await db.collection(COL.products).add(data);
      showToast("Product added successfully!");
    }
    closeModal();
    loadInventory();
  } catch(e) {
    showToast("Error saving product: " + e.message, "error");
  }
}

async function deleteProduct(id, name) {
  if (!confirmAction('Delete "' + name + '"? This cannot be undone.')) return;
  try {
    await db.collection(COL.products).doc(id).delete();
    showToast('"' + name + '" deleted.');
    loadInventory();
  } catch(e) {
    showToast("Error deleting product.", "error");
  }
}

document.addEventListener("DOMContentLoaded", function() {
  buildLayout(t("inv.title"));

  document.getElementById("topbar-actions").innerHTML =
    '<button class="btn btn-outline btn-sm" onclick="scanToFind()">📷 ' + t("inv.scan_find") + '</button>' +
    '<button class="btn btn-outline btn-sm" onclick="bulkScan()">📦 ' + t("inv.bulk_scan") + '</button>' +
    '<button class="btn btn-primary" onclick="openAdd()">＋ ' + t("inv.add_product") + '</button>';

  var catOpts = CATEGORIES.map(function(c) { return '<option>' + c + '</option>'; }).join("");
  var gstOpts = [0,5,12,18,28].map(function(g) { return '<option value="' + g + '">' + g + '%</option>'; }).join("");

  document.getElementById("page-content").innerHTML =
    // Category navigation
    '<div id="inv-cat-nav" class="card" style="margin-bottom:14px;padding:16px 18px"></div>' +

    '<div class="card" style="margin-bottom:0">'
    + '<div class="search-bar">'
    +   '<div class="search-input-wrap">'
    +     '<span class="search-icon">🔍</span>'
    +     '<input type="text" id="search-inp" placeholder="' + t("action.search") + '…" oninput="searchQ=this.value.toLowerCase();renderTable()"/>'
    +   '</div>'
    +   '<select id="status-filter" onchange="filterStatus=this.value;renderTable()">'
    +     '<option value="">' + t("inv.all_status") + '</option>'
    +     '<option value="lowstock">' + t("inv.low_stock") + '</option>'
    +     '<option value="expiring">' + t("inv.expiring") + '</option>'
    +   '</select>'
    + '</div>'
    + '<div class="table-wrap"><table>'
    +   '<thead><tr>'
    +     '<th>' + t("inv.product") + '</th><th>' + t("inv.category") + '</th><th>Size</th>'
    +     '<th>' + t("inv.cost") + '</th><th>' + t("inv.sell_price") + '</th><th>' + t("inv.quantity") + '</th>'
    +     '<th>' + t("inv.status") + '</th><th>' + t("inv.expiry") + '</th><th>' + t("inv.supplier") + '</th><th>Actions</th>'
    +   '</tr></thead>'
    +   '<tbody id="inv-tbody"><tr><td colspan="10" style="text-align:center;padding:32px;color:#888">Loading…</td></tr></tbody>'
    + '</table></div>'
    + '</div>'

    // Modal
    + '<div class="modal-overlay" id="prod-modal"><div class="modal">'
    +   '<div class="modal-header">'
    +     '<h3 id="modal-title">Add Product</h3>'
    +     '<button class="modal-close" onclick="closeModal()">✕</button>'
    +   '</div>'
    +   '<form id="prod-form"><input type="hidden" id="prod-id"/>'
    +   '<div class="form-grid">'
    +     '<div class="form-group full"><label>' + t("inv.company") + ' *</label><input type="text" id="prod-company" placeholder="e.g. Amul, Britannia, Parle"/></div>'
    +     '<div class="form-group full"><label>' + t("inv.product") + ' *</label><input type="text" id="prod-name" placeholder="e.g. Amul Gold Milk 500ml"/></div>'
    +     '<div class="form-group"><label>Category *</label><select id="prod-cat"><option value="">Select…</option>' + catOpts + '</select></div>'
    +     '<div class="form-group"><label>Size / Weight</label><input type="text" id="prod-size" placeholder="e.g. 500g, 1L, 250ml"/></div>'
    +     '<div class="form-group"><label>' + t("inv.cost") + ' (₹) *</label><input type="number" id="prod-cost" min="0" step="0.01" placeholder="0.00"/></div>'
    +     '<div class="form-group"><label>' + t("inv.sell_price") + ' (₹) *</label><input type="number" id="prod-sell" min="0" step="0.01" placeholder="0.00"/></div>'
    +     '<div class="form-group"><label>' + t("inv.quantity") + ' *</label><input type="number" id="prod-qty" min="0" placeholder="0"/></div>'
    +     '<div class="form-group"><label>' + t("inv.max_stock") + ' *</label><input type="number" id="prod-max" min="1" placeholder="100"/></div>'
    +     '<div class="form-group"><label>GST Slab (%)</label><select id="prod-gst">' + gstOpts + '</select></div>'
    +     '<div class="form-group"><label>Expiry Date</label><input type="date" id="prod-exp"/></div>'
    +     '<div class="form-group full"><label>' + t("inv.barcode") + '</label><div style="display:flex;gap:8px"><input type="text" id="prod-barcode" placeholder="' + t("inv.barcode") + '…" style="flex:1"/><button type="button" class="btn btn-sm btn-outline" onclick="scanBarcode()" style="white-space:nowrap">📷 Scan</button></div></div>'
    +     '<div class="form-group full"><label>' + t("inv.supplier") + '</label><select id="prod-supplier"><option value="">—</option></select></div>'
    +   '</div></form>'
    +   '<div class="modal-footer">'
    +     '<button class="btn btn-outline" onclick="closeModal()">' + t("action.cancel") + '</button>'
    +     '<button class="btn btn-primary" onclick="saveProduct()">💾 ' + t("action.save") + '</button>'
    +   '</div>'
    + '</div></div>';

  loadInventory();
});

function scanBarcode() {
  BarcodeScanner.open({
    onScan: function(code) {
      document.getElementById("prod-barcode").value = code;
    }
  });
}

function scanToFind() {
  BarcodeScanner.open({
    onScan: function(code) {
      var found = allProducts.find(function(p) { return p.barcode === code; });
      if (found) {
        openEdit(found.id);
        showToast("Found: " + found.name);
      } else {
        openAdd();
        setTimeout(function() {
          if (document.getElementById("prod-barcode")) document.getElementById("prod-barcode").value = code;
        }, 100);
        showToast("New product — barcode " + code + " pre-filled.", "info");
      }
    }
  });
}

var bulkScanResults = [];
function bulkScan() {
  bulkScanResults = [];
  BarcodeScanner.open({
    continuous: true,
    onScan: function(code) {
      var found = allProducts.find(function(p) { return p.barcode === code; });
      var existing = bulkScanResults.find(function(r) { return r.barcode === code; });
      if (existing) {
        existing.addQty++;
        showToast(existing.name + " — qty +" + existing.addQty);
      } else if (found) {
        bulkScanResults.push({ id: found.id, barcode: code, name: found.name, addQty: 1, isNew: false });
        showToast("✓ " + found.name + " found");
      } else {
        bulkScanResults.push({ barcode: code, name: "Unknown (" + code + ")", addQty: 1, isNew: true });
        showToast("⚠ New barcode: " + code, "info");
      }
    },
    onClose: function() {
      if (!bulkScanResults.length) return;
      if (confirmAction("Apply bulk scan? " + bulkScanResults.length + " item(s) scanned.")) {
        applyBulkScan();
      }
    }
  });
}

async function applyBulkScan() {
  var batch = db.batch();
  var updates = bulkScanResults.filter(function(r) { return !r.isNew; });
  updates.forEach(function(r) {
    batch.update(db.collection(COL.products).doc(r.id), {
      quantity: firebase.firestore.FieldValue.increment(r.addQty)
    });
  });
  if (updates.length) {
    await batch.commit();
    showToast(updates.length + " product(s) updated!");
    loadInventory();
  }
  var newItems = bulkScanResults.filter(function(r) { return r.isNew; });
  if (newItems.length) {
    showToast(newItems.length + " unknown barcode(s) — add them manually.", "info");
  }
}
</script>
</body>
</html>
