<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Shop — ShopSmart</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase.js?v=7"></script>
  <script src="../js/utils.js?v=7"></script>
  <script src="../js/auth_roles.js?v=1"></script>
  <script src="../js/i18n.js?v=1"></script>
  <script src="../js/layout.js?v=7"></script>
  <script src="../js/cart_logic.js?v=1"></script>
  <script src="../js/offline.js?v=1"></script>
</head>
<body>
<div id="app"></div>
<script>
var allProducts = [], allOffers = [], searchQ = "", activeCat = "";
var searchTimer = null;

async function loadShop() {
  try {
    var results = await Promise.all([
      db.collection(COL.products).orderBy("name").get(),
      db.collection(COL.offers).get()
    ]);
    allProducts = results[0].docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); })
      .filter(function(p) { return (p.quantity || 0) > 0; });
    var todayStr = today();
    allOffers = results[1].docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); })
      .filter(function(o) { return o.active && (!o.validUntil || o.validUntil >= todayStr); });
    renderCatGrid();
    // Translate product names if not English
    if (typeof translateProducts === "function" && currentLang !== "en") {
      await translateProducts(allProducts, currentLang);
    }
    renderProducts();
    renderTrending();
    CartManager.updateCartBadge();
  } catch(e) {
    var el = document.getElementById("shop-products");
    if (el) el.innerHTML = '<div style="text-align:center;padding:32px;color:var(--red)">Could not load products. Please refresh the page.</div>';
  }
}

function getOfferFor(pid) {
  return allOffers.find(function(o) {
    if (o.productId !== pid) return false;
    if (o.maxQty && (o.soldQty||0) >= o.maxQty) return false;
    return true;
  }) || null;
}

function renderCatGrid() {
  var el = document.getElementById("shop-categories");
  if (!el) return;
  var cats = ["Groceries","Dairy","Beverages","Personal Care","Stationery","Electronics","Snacks","Medicines","Cleaning","Other"];
  el.innerHTML = buildCatNav(cats, allProducts, activeCat, "filterByCat");
}

function filterByCat(cat) {
  activeCat = cat;
  renderCatGrid();
  renderProducts();
}

function renderProducts() {
  var list = allProducts;
  if (activeCat) list = list.filter(function(p) { return p.category === activeCat; });
  if (searchQ) list = list.filter(function(p) { return p.name.toLowerCase().includes(searchQ) || (p.company||"").toLowerCase().includes(searchQ); });

  var el = document.getElementById("shop-products");
  if (!el) return;
  if (!list.length) { el.innerHTML = '<div style="text-align:center;padding:32px;color:#888">No products found.</div>'; return; }

  el.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px">' +
    list.map(function(p) {
      var offer = getOfferFor(p.id);
      var price = p.sellingPrice;
      var priceHtml = fmtCurrency(price);
      var offerTag = '';
      if (offer) {
        var disc = offer.type === "percent" ? +(price * offer.value / 100).toFixed(2) : (offer.type === "flat" ? Math.min(offer.value, price) : 0);
        var newPrice = +(price - disc).toFixed(2);
        priceHtml = '<span style="color:var(--mint);font-weight:700">' + fmtCurrency(newPrice) + '</span> <span style="text-decoration:line-through;color:#aaa;font-size:12px">' + fmtCurrency(price) + '</span>';
        offerTag = '<div style="position:absolute;top:8px;right:8px;background:linear-gradient(135deg,var(--accent-l),var(--accent));color:#fff;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700">' + (offer.type === "percent" ? offer.value + "% OFF" : "₹" + offer.value + " OFF") + '</div>';
      }
      var stockTag = p.quantity <= 5 ? '<div style="font-size:10px;color:var(--accent);font-weight:600">Only ' + p.quantity + ' left</div>' : '';
      return '<div style="background:var(--card-bg);border-radius:14px;box-shadow:var(--shadow);border:1px solid var(--border);padding:16px;position:relative;display:flex;flex-direction:column;gap:8px">' +
        offerTag +
        '<div style="font-size:11px;color:var(--text-3)">' + p.category + '</div>' +
        '<div style="font-weight:700;font-size:14px;color:var(--text)">' + (typeof getTranslatedName === "function" ? getTranslatedName(p) : p.name) + '</div>' +
        '<div style="font-size:11px;color:#888">' + (typeof getTranslatedCompany === "function" ? getTranslatedCompany(p) : (p.company||"")) + (p.size ? " · " + p.size : "") + '</div>' +
        '<div style="font-size:15px;margin-top:auto">' + priceHtml + '</div>' +
        stockTag +
        '<button class="btn btn-sm btn-primary" style="width:100%;justify-content:center" onclick="addToShopCart(\'' + p.id + '\')">🛒 Add to Cart</button>' +
      '</div>';
    }).join("") + '</div>';
}

function renderTrending() {
  var el = document.getElementById("shop-trending");
  if (!el) return;
  var sorted = allProducts.slice().sort(function(a,b) { return (b.salesCount30||0) - (a.salesCount30||0); }).slice(0,5);
  if (!sorted.length) { el.innerHTML = '<div style="color:#888;font-size:13px">No trending data yet.</div>'; return; }
  el.innerHTML = sorted.map(function(p, i) {
    var icons = ["🥇","🥈","🥉","4️⃣","5️⃣"];
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">' +
      '<span style="font-size:16px">' + icons[i] + '</span>' +
      '<span style="flex:1;font-weight:600;font-size:13px">' + (typeof getTranslatedName === "function" ? getTranslatedName(p) : p.name) + '</span>' +
      '<span style="font-size:12px;color:var(--mint)">' + fmtCurrency(p.sellingPrice) + '</span>' +
    '</div>';
  }).join("");
}

function addToShopCart(pid) {
  var p = allProducts.find(function(x) { return x.id === pid; });
  if (!p) return;
  var offer = getOfferFor(pid);
  CartManager.addItem(p, offer);
}

function onSearchInput(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() {
    searchQ = val.toLowerCase();
    renderProducts();
  }, 300);
}

document.addEventListener("DOMContentLoaded", function() {
  buildLayout("🛒 Shop");
  document.getElementById("page-content").innerHTML =
    '<div style="margin-bottom:18px">' +
      '<div class="search-input-wrap" style="max-width:500px;margin:0 auto">' +
        '<span class="search-icon">🔍</span>' +
        '<input type="text" placeholder="What are you looking for today?" oninput="onSearchInput(this.value)" style="padding-left:34px;font-size:15px;padding:14px 14px 14px 38px"/>' +
      '</div>' +
    '</div>' +
    '<div id="shop-categories" style="margin-bottom:18px"></div>' +
    '<div class="grid-2" style="margin-bottom:18px">' +
      '<div class="card" style="grid-column:1/-1">' +
        '<div class="card-title">🛍️ Products</div>' +
        '<div id="shop-products"><div style="text-align:center;padding:24px;color:#888">Loading…</div></div>' +
      '</div>' +
    '</div>' +
    '<div class="card">' +
      '<div class="card-title">🔥 Trending Now</div>' +
      '<div id="shop-trending"><div style="color:#888">Loading…</div></div>' +
    '</div>';
  loadShop();
});
</script>
</body>
</html>
