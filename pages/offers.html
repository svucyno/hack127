<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Offers — ShopSmart</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase.js?v=6"></script>
  <script src="../js/utils.js?v=6"></script>
  <script src="../js/auth_roles.js?v=1"></script>
  <script src="../js/i18n.js?v=1"></script>
  <script src="../js/layout.js?v=6"></script>
  <script src="../js/offline.js?v=1"></script>
</head>
<body>
<div id="app"></div>
<script>
var offers = [], products = [], editingId = null;

function suggestDiscount(daysLeft) {
  if (daysLeft <= 3) return 40;
  if (daysLeft <= 7) return 30;
  if (daysLeft <= 15) return 20;
  return 10;
}

async function loadData() {
  try {
    var results = await Promise.all([
      db.collection(COL.offers).orderBy("createdAt","desc").get(),
      db.collection(COL.products).orderBy("name").get()
    ]);
    offers   = results[0].docs.map(function(d) { return Object.assign({ id:d.id }, d.data()); });
    products = results[1].docs.map(function(d) { return Object.assign({ id:d.id }, d.data()); });

    var sel = document.getElementById("offer-product");
    if (sel) sel.innerHTML = '<option value="">Select product…</option>' + products.map(function(p) {
      return '<option value="' + p.id + '" data-stock="' + p.quantity + '" data-price="' + p.sellingPrice + '">' + p.name + ' (Stock: ' + p.quantity + ')</option>';
    }).join("");

    renderOffers();
    renderExpiryClearance();
  } catch(e) {
    console.error("Offers load error:", e);
    var el = document.getElementById("offers-grid");
    if (el) el.innerHTML = '<div style="color:var(--red);grid-column:1/-1;text-align:center;padding:20px">Could not load offers. Please refresh.</div>';
  }
}

function hasActiveOffer(productId) {
  var todayStr = today();
  return offers.some(function(o) {
    return o.productId === productId && o.active && (!o.validUntil || o.validUntil >= todayStr) && (!o.maxQty || (o.soldQty || 0) < o.maxQty);
  });
}

function renderOffers() {
  var todayStr = today();
  var active = offers.filter(function(o) {
    return o.active && (!o.validUntil || o.validUntil >= todayStr) && (!o.maxQty || (o.soldQty||0) < o.maxQty);
  });
  var inactive = offers.filter(function(o) {
    return !o.active || (o.validUntil && o.validUntil < todayStr) || (o.maxQty && (o.soldQty||0) >= o.maxQty);
  });

  var el = document.getElementById("offers-grid");
  if (!offers.length) { el.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🎯</div><p>No offers yet. Create your first offer!</p></div>'; return; }

  function renderCard(o) {
    var p = products.find(function(x) { return x.id === o.productId; });
    var isExpired = o.validUntil && daysUntil(o.validUntil) < 0;
    var isSoldOut = o.maxQty && (o.soldQty||0) >= o.maxQty;
    var badgeText = o.type==="percent" ? o.value+"%" : o.type==="flat" ? "₹"+o.value : "Buy "+o.buyQty+" Get "+o.getQty;
    var statusBadge, statusText;
    if (isSoldOut) { statusBadge = "badge-grey"; statusText = "Sold Out"; }
    else if (isExpired) { statusBadge = "badge-grey"; statusText = "Expired"; }
    else if (o.active) { statusBadge = "badge-green"; statusText = "Active"; }
    else { statusBadge = "badge-grey"; statusText = "Inactive"; }

    var qtyBar = '';
    if (o.maxQty) {
      var sold = o.soldQty || 0;
      var pct = Math.min((sold / o.maxQty) * 100, 100);
      var barColor = pct >= 100 ? '#e8634f' : pct >= 70 ? '#f0ad4e' : '#3ab87d';
      qtyBar = '<div style="margin-top:8px">' +
        '<div style="font-size:11px;color:var(--text-2);margin-bottom:4px">' + sold + '/' + o.maxQty + ' sold</div>' +
        '<div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">' +
          '<div style="height:100%;width:' + pct + '%;background:' + barColor + ';border-radius:3px;transition:width 0.3s"></div>' +
        '</div></div>';
    }

    var reasonTag = o.reason ? '<div style="font-size:11px;margin-top:4px"><span class="badge badge-orange" style="font-size:10px">' + o.reason + '</span></div>' : '';

    var sellBtn = o.active && !isExpired && !isSoldOut && p
      ? '<a href="billing.html?productId=' + o.productId + '&offerId=' + o.id + '" class="btn btn-sm btn-accent">🛒 Sell Now</a>'
      : '';

    return '<div class="offer-card">' +
      '<div class="offer-badge">' + badgeText + ' OFF</div>' +
      '<div class="offer-product">' + (p ? p.name : o.productId) + '</div>' +
      '<div class="offer-detail">Type: ' + (o.type==="percent" ? "Percentage" : o.type==="flat" ? "Flat Discount" : "Buy X Get Y") + '</div>' +
      '<div class="offer-detail">Valid until: ' + (o.validUntil ? fmtDate(o.validUntil) : "No limit") + '</div>' +
      reasonTag + qtyBar +
      '<div class="offer-detail" style="margin-top:6px"><span class="badge ' + statusBadge + '">' + statusText + '</span></div>' +
      '<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">' +
        '<button class="btn btn-sm btn-outline" onclick="toggleOffer(\'' + o.id + '\',' + o.active + ')">' + (o.active ? "Deactivate" : "Activate") + '</button>' +
        sellBtn +
        '<button class="btn btn-sm btn-danger" onclick="deleteOffer(\'' + o.id + '\')">Delete</button>' +
      '</div>' +
    '</div>';
  }

  var html = "";
  if (active.length) {
    html += '<div style="grid-column:1/-1"><h3 style="color:var(--green-d,var(--mint-dark));margin-bottom:12px">Active Offers (' + active.length + ')</h3></div>' + active.map(renderCard).join("");
  }
  if (inactive.length) {
    html += '<div style="grid-column:1/-1"><h3 style="color:#888;margin:16px 0 12px">Inactive / Expired / Sold Out (' + inactive.length + ')</h3></div>' + inactive.map(renderCard).join("");
  }
  el.innerHTML = html;
}
</script>
<script>
function renderExpiryClearance() {
  var expiring = products.filter(function(p) {
    if (!p.expiryDate) return false;
    var thresholds = getExpiryThresholds(p.category);
    var exp = daysUntil(p.expiryDate);
    return exp <= thresholds.warning && exp >= 0;
  });

  // Filter out products that already have an active offer
  var needsOffer = expiring.filter(function(p) { return !hasActiveOffer(p.id); });
  var hasOffer = expiring.filter(function(p) { return hasActiveOffer(p.id); });

  var el = document.getElementById("expiry-suggestions");
  if (!expiring.length) {
    el.innerHTML = '<p style="color:#888;font-size:13px">No products approaching expiry. All good!</p>';
    return;
  }

  var html = '';
  if (needsOffer.length) {
    html += '<div style="margin-bottom:12px;font-size:12px;color:var(--accent);font-weight:600">⚠ ' + needsOffer.length + ' product' + (needsOffer.length!==1?'s':'') + ' expiring without an offer:</div>';
    html += needsOffer.map(function(p) {
      var exp = daysUntil(p.expiryDate);
      var thresholds = getExpiryThresholds(p.category);
      var badgeClass = exp <= thresholds.urgent ? "badge-red" : "badge-yellow";
      var disc = suggestDiscount(exp);
      return '<div class="expiry-suggestion-card">' +
        '<div style="display:flex;align-items:center;gap:12px;flex:1;flex-wrap:wrap">' +
          '<span class="badge ' + badgeClass + '">' + exp + 'd left</span>' +
          '<span style="font-weight:600">' + p.name + '</span>' +
          '<span style="font-size:11px;color:#888">(' + p.category + ' · Stock: ' + p.quantity + ' · ' + fmtCurrency(p.sellingPrice) + ')</span>' +
        '</div>' +
        '<div style="display:flex;gap:8px;align-items:center">' +
          '<span style="font-size:12px;color:var(--accent);font-weight:600">Suggest ' + disc + '% off</span>' +
          '<button class="btn btn-sm btn-accent" onclick="quickOffer(\'' + p.id + '\',' + disc + ')">+ Create Offer</button>' +
        '</div>' +
      '</div>';
    }).join("");
  }

  if (hasOffer.length) {
    html += '<div style="margin-top:16px;margin-bottom:8px;font-size:12px;color:var(--mint-dark,#2a9d66);font-weight:600">✅ ' + hasOffer.length + ' expiring product' + (hasOffer.length!==1?'s':'') + ' already have offers:</div>';
    html += hasOffer.map(function(p) {
      var exp = daysUntil(p.expiryDate);
      return '<div style="display:flex;align-items:center;gap:12px;padding:8px 0;font-size:13px;border-bottom:1px solid var(--border)">' +
        '<span class="badge badge-green">Covered</span>' +
        '<span>' + p.name + ' — ' + exp + 'd left</span>' +
      '</div>';
    }).join("");
  }

  el.innerHTML = html;
}

function quickOffer(productId, discount) {
  document.getElementById("offer-product").value = productId;
  document.getElementById("offer-type").value = "percent";
  document.getElementById("offer-value").value = discount || 10;
  document.getElementById("offer-reason").value = "Expiry Clearance";
  toggleOfferFields();
  onProductSelect();
  var p = products.find(function(x) { return x.id === productId; });
  if (p) {
    if (p.expiryDate) document.getElementById("offer-valid").value = p.expiryDate;
    document.getElementById("offer-maxqty").value = p.quantity;
  }
  openModal();
}

function onProductSelect() {
  var sel = document.getElementById("offer-product");
  var opt = sel.options[sel.selectedIndex];
  var info = document.getElementById("product-stock-info");
  if (opt && opt.value) {
    var stock = opt.getAttribute("data-stock");
    var price = opt.getAttribute("data-price");
    info.innerHTML = '<span style="font-size:12px;color:var(--text-2)">Stock: <strong>' + stock + '</strong> · Price: <strong>' + fmtCurrency(parseFloat(price)) + '</strong></span>';
  } else {
    info.innerHTML = '';
  }
}

function toggleOfferFields() {
  var type = document.getElementById("offer-type").value;
  var valueGroup = document.getElementById("value-group");
  var bxgyGroup = document.getElementById("bxgy-group");
  if (type === "bxgy") {
    valueGroup.style.display = "none";
    bxgyGroup.style.display = "flex";
  } else {
    valueGroup.style.display = "flex";
    bxgyGroup.style.display = "none";
  }
}

function openModal() {
  editingId = null;
  document.getElementById("offer-modal").classList.add("open");
}
function closeModal() {
  document.getElementById("offer-modal").classList.remove("open");
  document.getElementById("offer-form").reset();
  document.getElementById("product-stock-info").innerHTML = '';
}
</script>
<script>
async function saveOffer() {
  var productId  = document.getElementById("offer-product").value;
  var type       = document.getElementById("offer-type").value;
  var validUntil = document.getElementById("offer-valid").value;
  var maxQty     = parseInt(document.getElementById("offer-maxqty").value);
  var reason     = document.getElementById("offer-reason").value;
  var data;

  if (type === "bxgy") {
    var buyQty = parseInt(document.getElementById("offer-buyqty").value);
    var getQty = parseInt(document.getElementById("offer-getqty").value);
    if (!productId || isNaN(buyQty) || isNaN(getQty)) { showToast("Please fill all required fields.", "error"); return; }
    data = { productId: productId, type: type, buyQty: buyQty, getQty: getQty, value: 0 };
  } else {
    var value = parseFloat(document.getElementById("offer-value").value);
    if (!productId || !type || isNaN(value)) { showToast("Please fill all required fields.", "error"); return; }
    data = { productId: productId, type: type, value: value };
  }

  data.validUntil = validUntil || null;
  data.maxQty = isNaN(maxQty) || maxQty <= 0 ? null : maxQty;
  data.soldQty = 0;
  data.reason = reason || null;
  data.active = true;
  data.createdAt = firebase.firestore.FieldValue.serverTimestamp();

  try {
    await db.collection(COL.offers).add(data);
    showToast("Offer created!");
    closeModal();
    loadData();
  } catch(e) {
    showToast("Could not create offer. Please try again.", "error");
  }
}

async function toggleOffer(id, current) {
  await db.collection(COL.offers).doc(id).update({ active: !current });
  var o = offers.find(function(x) { return x.id === id; });
  if (o) o.active = !current;
  renderOffers();
  renderExpiryClearance();
  showToast(current ? "Offer deactivated." : "Offer activated!");
}

async function deleteOffer(id) {
  if (!confirmAction("Delete this offer?")) return;
  await db.collection(COL.offers).doc(id).delete();
  offers = offers.filter(function(x) { return x.id !== id; });
  renderOffers();
  renderExpiryClearance();
  showToast("Offer deleted.");
}

document.addEventListener("DOMContentLoaded", function() {
  buildLayout(t("offer.title"));
  document.getElementById("topbar-actions").innerHTML = '<button class="btn btn-primary" onclick="openModal()">+ ' + t("offer.create") + '</button>';

  document.getElementById("page-content").innerHTML =
    // Expiry clearance section
    '<div class="card" style="margin-bottom:18px">' +
      '<div class="card-title">🔥 ' + t("offer.expiry_clear") + '</div>' +
      '<div id="expiry-suggestions"><div style="color:#888">Loading…</div></div>' +
    '</div>' +

    // All offers
    '<div class="card">' +
      '<div class="card-title">All Offers</div>' +
      '<div id="offers-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">' +
        '<div style="color:#888">Loading…</div>' +
      '</div>' +
    '</div>' +

    // Create Offer Modal
    '<div class="modal-overlay" id="offer-modal">' +
      '<div class="modal" style="max-width:560px">' +
        '<div class="modal-header"><h3>' + t("offer.create") + '</h3><button class="modal-close" onclick="closeModal()">✕</button></div>' +
        '<form id="offer-form">' +
          '<div class="form-group" style="margin-bottom:12px">' +
            '<label>' + t("offer.product") + ' *</label>' +
            '<select id="offer-product" onchange="onProductSelect()"><option value="">Loading…</option></select>' +
            '<div id="product-stock-info" style="margin-top:4px"></div>' +
          '</div>' +
          '<div class="form-grid" style="margin-bottom:12px">' +
            '<div class="form-group">' +
              '<label>' + t("offer.type") + ' *</label>' +
              '<select id="offer-type" onchange="toggleOfferFields()">' +
                '<option value="percent">' + t("offer.percent") + ' (%)</option>' +
                '<option value="flat">' + t("offer.flat") + ' (₹)</option>' +
                '<option value="bxgy">' + t("offer.bxgy") + '</option>' +
              '</select>' +
            '</div>' +
            '<div class="form-group" id="value-group">' +
              '<label>Discount Value *</label>' +
              '<input type="number" id="offer-value" min="0" placeholder="e.g. 10"/>' +
            '</div>' +
            '<div class="form-group" id="bxgy-group" style="display:none;gap:8px">' +
              '<label>Buy Qty / Get Free</label>' +
              '<div style="display:flex;gap:8px"><input type="number" id="offer-buyqty" min="1" placeholder="Buy" style="width:50%"/><input type="number" id="offer-getqty" min="1" placeholder="Get Free" style="width:50%"/></div>' +
            '</div>' +
          '</div>' +
          '<div class="form-grid" style="margin-bottom:12px">' +
            '<div class="form-group">' +
              '<label>' + t("offer.max_qty") + '</label>' +
              '<input type="number" id="offer-maxqty" min="1" placeholder="Leave empty for unlimited"/>' +
            '</div>' +
            '<div class="form-group">' +
              '<label>' + t("offer.valid_until") + '</label>' +
              '<input type="date" id="offer-valid"/>' +
            '</div>' +
          '</div>' +
          '<div class="form-group" style="margin-bottom:12px">' +
            '<label>Reason</label>' +
            '<select id="offer-reason">' +
              '<option value="">— None —</option>' +
              '<option value="Expiry Clearance">Expiry Clearance</option>' +
              '<option value="Festival Offer">Festival Offer</option>' +
              '<option value="Clearance Sale">Clearance Sale</option>' +
              '<option value="Bulk Deal">Bulk Deal</option>' +
              '<option value="Other">Other</option>' +
            '</select>' +
          '</div>' +
        '</form>' +
        '<div class="modal-footer">' +
          '<button class="btn btn-outline" onclick="closeModal()">' + t("action.cancel") + '</button>' +
          '<button class="btn btn-primary" onclick="saveOffer()">' + t("offer.create") + '</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  loadData();
});
</script>
</body>
</html>
