<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Order Management — ShopSmart</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase.js?v=7"></script>
  <script src="../js/utils.js?v=7"></script>
  <script src="../js/auth_roles.js?v=1"></script>
  <script src="../js/i18n.js?v=1"></script>
  <script src="../js/layout.js?v=7"></script>
  <script src="../js/offline.js?v=1"></script>
</head>
<body>
<div id="app"></div>
<script>
var allOrders = [], filterStatus = "active";

async function loadOrders() {
  try {
    var snap = await db.collection(COL.sales).get();
    allOrders = snap.docs.map(function(d) { return Object.assign({id:d.id}, d.data()); })
      .filter(function(o) { return o.userId; })
      .sort(function(a,b) {
        var ta = a.createdAt && a.createdAt.toDate ? a.createdAt.toDate().getTime() : 0;
        var tb = b.createdAt && b.createdAt.toDate ? b.createdAt.toDate().getTime() : 0;
        return tb - ta;
      });
    // Normalize old "Not Started" to "New"
    allOrders.forEach(function(o) { if (o.status === "Not Started") o.status = "New"; });
    renderOrders();
    updateCounts();
  } catch(e) {
    var el = document.getElementById("orders-list");
    if (el) el.innerHTML = '<div style="color:var(--red);text-align:center;padding:24px">Could not load orders.</div>';
  }
}

function updateCounts() {
  var c = { "New":0, "Packing":0, "Ready":0, "Completed":0 };
  allOrders.forEach(function(o) { if (c[o.status] !== undefined) c[o.status]++; });
  var el = document.getElementById("order-counts");
  if (!el) return;
  el.innerHTML =
    '<div class="kpi-card red" style="padding:12px 16px"><div class="kpi-label">New</div><div class="kpi-value" style="font-size:24px">' + c["New"] + '</div></div>' +
    '<div class="kpi-card yellow" style="padding:12px 16px"><div class="kpi-label">Packing</div><div class="kpi-value" style="font-size:24px">' + c["Packing"] + '</div></div>' +
    '<div class="kpi-card" style="padding:12px 16px"><div class="kpi-label">Ready</div><div class="kpi-value" style="font-size:24px">' + c["Ready"] + '</div></div>' +
    '<div class="kpi-card blue" style="padding:12px 16px"><div class="kpi-label">Done</div><div class="kpi-value" style="font-size:24px">' + c["Completed"] + '</div></div>';
}

function renderOrders() {
  var list = allOrders;
  if (filterStatus === "active") list = list.filter(function(o) { return o.status !== "Completed"; });
  else if (filterStatus !== "all") list = list.filter(function(o) { return o.status === filterStatus; });

  var el = document.getElementById("orders-list");
  if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><p>No orders to show.</p></div>'; return; }

  el.innerHTML = list.map(function(o) {
    var dateStr = o.createdAt && o.createdAt.toDate ? o.createdAt.toDate().toLocaleString("en-IN",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : "—";
    var itemsHtml = (o.items||[]).map(function(i) {
      return '<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0"><span>' + i.name + ' x' + i.qty + '</span><span>' + fmtCurrency((i.price||0)*i.qty) + '</span></div>';
    }).join("");
    var sc = {"New":"badge-red","Packing":"badge-yellow","Ready":"badge-green","Completed":"badge-blue"};
    var si = {"New":"🆕","Packing":"📦","Ready":"✅","Completed":"🎉"};
    var st = o.status;

    var actionBtn = '';
    if (st === "New") actionBtn = '<button class="btn btn-sm btn-primary" onclick="acceptOrder(\'' + o.id + '\')">✅ Accept Order</button>';
    else if (st === "Packing") actionBtn = '<button class="btn btn-sm btn-primary" onclick="packingDone(\'' + o.id + '\')">📦 Packing Done</button>';
    else if (st === "Ready") actionBtn = '<span style="font-size:11px;color:var(--text-3)">⏳ Waiting for customer pickup…</span>';
    else actionBtn = '<span class="badge badge-blue" style="font-size:11px">🎉 Done</span>';

    var steps = ["New","Packing","Ready","Completed"];
    var ci = steps.indexOf(st); if (ci < 0) ci = 0;
    var prog = '<div style="display:flex;gap:4px;margin:10px 0 4px">' + steps.map(function(s,i) {
      return '<div style="flex:1;height:4px;border-radius:2px;background:' + (i<=ci?"var(--mint)":"var(--border)") + '"></div>';
    }).join("") + '</div>';

    return '<div style="background:var(--card-bg);border-radius:14px;box-shadow:var(--shadow);border:1px solid var(--border);padding:16px;margin-bottom:12px">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">' +
        '<div><div style="font-weight:700;font-size:14px;color:var(--text)">' + (o.orderId||o.id) + '</div>' +
        '<div style="font-size:12px;color:var(--text-3)">' + dateStr + '</div>' +
        '<div style="font-size:12px;color:var(--text-2);margin-top:2px">👤 ' + (o.customerName||"Customer") + '</div></div>' +
        '<span class="badge ' + (sc[st]||"badge-grey") + '">' + (si[st]||"") + ' ' + st + '</span>' +
      '</div>' + prog +
      '<div style="background:rgba(0,0,0,0.04);border-radius:8px;padding:8px 10px;margin:8px 0">' + itemsHtml +
        '<div style="display:flex;justify-content:space-between;font-weight:700;font-size:13px;padding-top:6px;border-top:1px solid var(--border);margin-top:4px"><span>Total</span><span>' + fmtCurrency(o.grandTotal) + '</span></div></div>' +
      '<div style="display:flex;justify-content:flex-end">' + actionBtn + '</div></div>';
  }).join("");
}

async function acceptOrder(id) {
  try {
    await db.collection(COL.sales).doc(id).update({ status: "Packing" });
    var o = allOrders.find(function(x){return x.id===id;}); if(o) o.status="Packing";
    renderOrders(); updateCounts();
    showToast("Order accepted! Start packing.");
  } catch(e) { showToast(friendlyError(e),"error"); }
}

async function packingDone(id) {
  var o = allOrders.find(function(x){return x.id===id;}); if(!o) return;
  try {
    await db.collection(COL.sales).doc(id).update({
      status: "Ready", billGenerated: true,
      readyAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    o.status = "Ready"; o.billGenerated = true;
    printBill(o);
    renderOrders(); updateCounts();
    showToast("Bill generated! Order ready for pickup.");
  } catch(e) { showToast(friendlyError(e),"error"); }
}

function printBill(o) {
  var s = JSON.parse(localStorage.getItem("shopSettings")||"{}");
  var w = window.open("","_blank","width=400,height=600");
  if (!w) { showToast("Allow pop-ups to print.","error"); return; }
  var items = (o.items||[]).map(function(i) { return '<div class="r"><span>'+i.name+' x'+i.qty+'</span><span>Rs.'+((i.price||0)*i.qty).toFixed(2)+'</span></div>'; }).join("");
  w.document.write('<html><head><title>Bill</title><style>body{font-family:monospace;font-size:13px;padding:20px;max-width:320px}h2{text-align:center;margin:0}p{text-align:center;color:#555;margin:2px 0}hr{border:1px dashed #ccc;margin:10px 0}.r{display:flex;justify-content:space-between;margin:4px 0}.t{font-weight:bold;font-size:15px}</style></head><body>'+
    '<h2>'+(s.shopName||"ShopSmart")+'</h2><p>'+(s.address||"")+'</p><hr/>'+
    '<div class="r"><span>Order</span><span>'+(o.orderId||o.id)+'</span></div>'+
    '<div class="r"><span>Customer</span><span>'+(o.customerName||"")+'</span></div><hr/>'+
    items+'<hr/>'+
    '<div class="r t"><span>TOTAL</span><span>Rs.'+(o.grandTotal||0).toFixed(2)+'</span></div><hr/>'+
    '<p>Thank you!</p></body></html>');
  w.document.close(); w.focus(); w.print();
}

function setFilter(f) {
  filterStatus = f;
  document.querySelectorAll('.fbtn').forEach(function(b){b.className='btn btn-sm btn-outline fbtn';});
  var a = document.getElementById('f-'+f); if(a) a.className='btn btn-sm btn-primary fbtn';
  renderOrders();
}

setInterval(function(){ if(document.visibilityState==="visible") loadOrders(); }, 10000);

document.addEventListener("DOMContentLoaded", function() {
  buildLayout("📋 Orders");
  document.getElementById("page-content").innerHTML =
    '<div id="order-counts" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px"></div>' +
    '<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">' +
      '<button class="btn btn-sm btn-primary fbtn" id="f-active" onclick="setFilter(\'active\')">Active</button>' +
      '<button class="btn btn-sm btn-outline fbtn" id="f-New" onclick="setFilter(\'New\')">🆕 New</button>' +
      '<button class="btn btn-sm btn-outline fbtn" id="f-Packing" onclick="setFilter(\'Packing\')">📦 Packing</button>' +
      '<button class="btn btn-sm btn-outline fbtn" id="f-Ready" onclick="setFilter(\'Ready\')">✅ Ready</button>' +
      '<button class="btn btn-sm btn-outline fbtn" id="f-Completed" onclick="setFilter(\'Completed\')">🎉 Done</button>' +
      '<button class="btn btn-sm btn-outline fbtn" id="f-all" onclick="setFilter(\'all\')">All</button>' +
    '</div>' +
    '<div class="card"><div class="card-title">📋 Incoming Orders</div>' +
    '<div id="orders-list"><div style="text-align:center;padding:24px;color:#888">Loading…</div></div></div>';
  loadOrders();
});
</script>
</body>
</html>
