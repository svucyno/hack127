<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Notifications — ShopSmart</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase.js?v=7"></script>
  <script src="../js/utils.js?v=7"></script>
  <script src="../js/auth_roles.js?v=1"></script>
  <script src="../js/i18n.js?v=1"></script>
  <script src="../js/layout.js?v=7"></script>
  <script src="../js/cart_logic.js?v=1"></script>
  <script src="../js/offline.js?v=1"></script>
</head>
<body>
<div id="app"></div>
<script>
var notifications = [];

async function loadNotifications() {
  try {
    var results = await Promise.all([
      db.collection(COL.offers).get(),
      db.collection(COL.products).get()
    ]);
    var todayStr = today();
    var allOffers = results[0].docs.map(function(d) { return Object.assign({id:d.id}, d.data()); });
    var allProducts = results[1].docs.map(function(d) { return Object.assign({id:d.id}, d.data()); });
    notifications = [];

    // Active deals notification
    var activeDeals = allOffers.filter(function(o) {
      return o.active && (!o.validUntil || o.validUntil >= todayStr) && (!o.maxQty || (o.soldQty||0) < o.maxQty);
    });
    activeDeals.forEach(function(o) {
      var p = allProducts.find(function(x) { return x.id === o.productId; });
      if (!p) return;
      var badge = o.type === "percent" ? o.value + "% OFF" : o.type === "flat" ? "₹" + o.value + " OFF" : "Special Deal";
      var icon = "🏷️", type = "deal";

      // Expiring soon deals
      if (o.validUntil && daysUntil(o.validUntil) <= 3) {
        icon = "⏰"; type = "urgent";
        notifications.push({ icon: icon, type: type, title: "Deal ending soon!", message: badge + " on " + p.name + " — only " + daysUntil(o.validUntil) + " day(s) left!", time: o.createdAt, productId: p.id, offerId: o.id });
      }
      // Limited stock deals
      else if (o.maxQty && (o.soldQty||0) >= o.maxQty * 0.7) {
        icon = "🔥"; type = "hot";
        var left = o.maxQty - (o.soldQty||0);
        notifications.push({ icon: icon, type: type, title: "Selling fast!", message: "Only " + left + " left at " + badge + " on " + p.name, time: o.createdAt, productId: p.id, offerId: o.id });
      }
      // Regular deal
      else {
        notifications.push({ icon: icon, type: type, title: badge + " on " + p.name, message: (o.reason || "Special offer") + " — " + fmtCurrency(p.sellingPrice), time: o.createdAt, productId: p.id, offerId: o.id });
      }
    });

    // Low price products (good deals even without offers)
    var cheapProducts = allProducts.filter(function(p) { return p.sellingPrice <= 50 && (p.quantity||0) > 0; }).slice(0, 3);
    cheapProducts.forEach(function(p) {
      notifications.push({ icon: "💰", type: "tip", title: "Budget pick: " + p.name, message: "Just " + fmtCurrency(p.sellingPrice) + " — great value!", time: null, productId: p.id });
    });

    // New arrivals (products added in last 7 days)
    var weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
    allProducts.forEach(function(p) {
      if (p.createdAt && p.createdAt.toDate && p.createdAt.toDate() >= weekAgo) {
        notifications.push({ icon: "✨", type: "new", title: "New arrival: " + p.name, message: (p.company||"") + " — " + fmtCurrency(p.sellingPrice), time: p.createdAt, productId: p.id });
      }
    });

    // Sort: urgent first, then by time
    var typeOrder = { urgent: 0, hot: 1, deal: 2, new: 3, tip: 4 };
    notifications.sort(function(a, b) {
      var oa = typeOrder[a.type] || 5, ob = typeOrder[b.type] || 5;
      if (oa !== ob) return oa - ob;
      var ta = a.time && a.time.toDate ? a.time.toDate().getTime() : 0;
      var tb = b.time && b.time.toDate ? b.time.toDate().getTime() : 0;
      return tb - ta;
    });

    renderNotifications();
  } catch(e) {
    console.error("Notifications error:", e);
    document.getElementById("notif-list").innerHTML = '<div class="empty-state"><div class="empty-icon">🔔</div><p>No notifications right now.</p></div>';
  }
}

function renderNotifications() {
  var el = document.getElementById("notif-list");
  if (!notifications.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔔</div><p>No notifications right now. Check back later!</p></div>';
    return;
  }

  var colorMap = { urgent: "#ffcdd2", hot: "#fff3e0", deal: "#e8f5e9", new: "#e3f2fd", tip: "#f3e5f5" };
  var borderMap = { urgent: "#e84a3d", hot: "#ff9800", deal: "#3ab87d", new: "#1565C0", tip: "#7c3aed" };

  el.innerHTML = notifications.map(function(n) {
    var bg = colorMap[n.type] || "#f5f5f5";
    var border = borderMap[n.type] || "#ccc";
    var timeStr = n.time && n.time.toDate ? n.time.toDate().toLocaleDateString("en-IN", {day:"2-digit",month:"short"}) : "";
    var actionBtn = n.productId
      ? '<button class="btn btn-sm btn-primary" style="margin-top:8px;font-size:11px" onclick="goToProduct(\'' + n.productId + '\')">🛒 Shop Now</button>'
      : '';
    return '<div style="display:flex;gap:12px;padding:14px 16px;border-radius:12px;margin-bottom:10px;background:' + bg + ';border-left:4px solid ' + border + ';position:relative">' +
      '<div style="font-size:24px;flex-shrink:0;margin-top:2px">' + n.icon + '</div>' +
      '<div style="flex:1">' +
        '<div style="font-weight:700;font-size:13px;color:var(--text,#333)">' + n.title + '</div>' +
        '<div style="font-size:12px;color:var(--text-2,#666);margin-top:2px">' + n.message + '</div>' +
        actionBtn +
      '</div>' +
      (timeStr ? '<div style="font-size:10px;color:var(--text-3,#999);white-space:nowrap">' + timeStr + '</div>' : '') +
    '</div>';
  }).join("");

  // Update badge
  var badge = document.getElementById("notif-count");
  if (badge) badge.textContent = notifications.length;
}

function goToProduct(pid) {
  window.location.href = "landing.html";
}

document.addEventListener("DOMContentLoaded", function() {
  buildLayout("🔔 Notifications");
  document.getElementById("page-content").innerHTML =
    '<div class="card">' +
      '<div class="card-title">🔔 Your Notifications</div>' +
      '<div id="notif-list"><div style="text-align:center;padding:24px;color:#888">Loading…</div></div>' +
    '</div>';
  loadNotifications();
});
</script>
</body>
</html>
